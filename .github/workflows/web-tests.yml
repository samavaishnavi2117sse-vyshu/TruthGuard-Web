name: TruthGuard Web E2E Testing CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  web-tests:
    name: 🧪 Selenium E2E Tests — 135 Test Cases
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Chrome (ubuntu-latest already has it; this ensures latest) ───────
      - name: 🌐 Setup Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ── 4. Web App Dependencies ─────────────────────────────────────────────
      - name: 📦 Install Web App Dependencies
        run: npm install
        working-directory: web-app

      # ── 5. Selenium + ExcelJS Dependencies ──────────────────────────────────
      - name: 📦 Install Selenium Test Dependencies
        run: npm install
        working-directory: selenium-testing

      # ── 6. Run the 135 E2E Tests ─────────────────────────────────────────────
      #    selenium-webdriver 4.6+ includes selenium-manager which auto-downloads
      #    the correct ChromeDriver — no manual chromedriver install needed.
      - name: 🧪 Run Selenium E2E Tests
        run: node test.js
        working-directory: selenium-testing
        env:
          # Required for headless Chrome on Linux CI
          DISPLAY: :99

      # ── 7. Upload Excel Report as Artifact ───────────────────────────────────
      - name: 📊 Upload Excel Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Selenium_E2E_Report_TruthGuard
          # Wildcard captures timestamped filename e.g. Selenium_E2E_Report_TruthGuard_2026-...xlsx
          path: selenium-testing/Selenium_E2E_Report_TruthGuard_*.xlsx
          retention-days: 30
          if-no-files-found: warn

      # ── 8. Summary ───────────────────────────────────────────────────────────
      - name: 📋 How to Download the Report
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║    ✅ TruthGuard Selenium E2E — Test Run Complete        ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  📥 To download the Excel report:                        ║"
          echo "║     GitHub → Actions → This Run → Artifacts section      ║"
          echo "║     Click: Selenium_E2E_Report_TruthGuard                ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""
          REPORT=$(ls selenium-testing/Selenium_E2E_Report_TruthGuard_*.xlsx 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            echo "✅ Report generated: $REPORT"
            ls -lh "$REPORT"
          else
            echo "⚠️  No report file found in selenium-testing/"
          fi
